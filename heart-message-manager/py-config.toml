# PyScript configuration for the sign-preview page.
# https://pyscript.com/docs/

[runtime]
# Pyodide 0.26 — supports py-config.toml in 2024.4+ release line
src = "https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js"

[files]
# Files in the browser-side render path. PyScript fetches them from the
# /static/ URL when the page loads. The browser now pulls the shared
# `lib_shared/` modules (effect primitives, display polymorphism, the
# EffectsCoordinator, and the patterns) directly — no mirror tree of
# Pi-side files. PngDisplay / VideoDisplay are not browser-eligible
# (filesystem assets, OpenCV) so they're not in this list.
"lib_shared/__init__.py" = "/static/preview/lib_shared/__init__.py"
"lib_shared/effect_base.py" = "/static/preview/lib_shared/effect_base.py"
"lib_shared/display_base.py" = "/static/preview/lib_shared/display_base.py"
"lib_shared/effects_coordinator.py" = "/static/preview/lib_shared/effects_coordinator.py"
"lib_shared/effects_loader.py" = "/static/preview/lib_shared/effects_loader.py"
# The override-aware loader reads the canonical effects_settings.json
# from disk at module-import time. PyScript has to fetch this file
# into MEMFS or the browser crashes on first `EffectsSettings()` call
# with `[Errno 44] No such file or directory`. The symlink at
# `static/preview/lib_shared/config/effects_settings.json` mirrors the
# real path so Flask serves it under the URL PyScript expects.
"lib_shared/config/effects_settings.json" = "/static/preview/lib_shared/config/effects_settings.json"
"lib_shared/message_manager.py" = "/static/preview/lib_shared/message_manager.py"
"lib_shared/messages.py" = "/static/preview/lib_shared/messages.py"
"lib_shared/models.py" = "/static/preview/lib_shared/models.py"
"lib_shared/scroller_base.py" = "/static/preview/lib_shared/scroller_base.py"
# Weighted message selector (issue #26). Runs in both runtimes
# unchanged — the same Python class is consumed by the Pi's renderer
# (with `heart-matrix-controller/event_log.py`) and by the browser
# preview (with `static/event_log.py`).
"lib_shared/selector.py" = "/static/preview/lib_shared/selector.py"
"lib_shared/config_migrations.py" = "/static/preview/lib_shared/config_migrations.py"
# Senders-filter helpers (issue #6). `phone_utils.normalize_phone`
# backs the in-memory sender lookup key; `name_utils.format_display_name`
# resolves the operator-supplied name per `effects_settings.name_display_format`.
"lib_shared/phone_utils.py" = "/static/preview/lib_shared/phone_utils.py"
"lib_shared/name_utils.py" = "/static/preview/lib_shared/name_utils.py"
"lib_shared/patterns/__init__.py" = "/static/preview/lib_shared/patterns/__init__.py"
"lib_shared/patterns/fireworks.py" = "/static/preview/lib_shared/patterns/fireworks.py"
"lib_shared/patterns/nightsky.py" = "/static/preview/lib_shared/patterns/nightsky.py"
"lib_shared/patterns/honeycomb.py" = "/static/preview/lib_shared/patterns/honeycomb.py"
"lib_shared/patterns/windfire.py" = "/static/preview/lib_shared/patterns/windfire.py"
"lib_shared/patterns/coronal_mass_ejection.py" = "/static/preview/lib_shared/patterns/coronal_mass_ejection.py"
"lib_shared/patterns/eyeball.py" = "/static/preview/lib_shared/patterns/eyeball.py"
"lib_shared/patterns/marble.py" = "/static/preview/lib_shared/patterns/marble.py"
"lib_shared/patterns/metaballs.py" = "/static/preview/lib_shared/patterns/metaballs.py"
"lib_shared/patterns/hyperspace.py" = "/static/preview/lib_shared/patterns/hyperspace.py"
"lib_shared/patterns/fractal_flower.py" = "/static/preview/lib_shared/patterns/fractal_flower.py"
"lib_shared/patterns/heartbeat.py" = "/static/preview/lib_shared/patterns/heartbeat.py"
# `BrowserMediaOverlay` (issue #38) is the preview-side equivalent of
# MediaCycler: it lets the browser drive the same per-message MMS
# cycle logic via HTML <img>/<video> elements instead of PIL/cv2.
"lib_shared/patterns/browser_media_overlay.py" = "/static/preview/lib_shared/patterns/browser_media_overlay.py"
"heart-message-manager/app_main.py" = "/static/preview/heart-message-manager/app_main.py"
"heart-message-manager/preview_display.py" = "/static/preview/heart-message-manager/preview_display.py"
"heart-message-manager/preview_scroller.py" = "/static/preview/heart-message-manager/preview_scroller.py"
"heart-message-manager/preview_main.py" = "/static/preview/heart-message-manager/preview_main.py"
# Browser-side event log (issue #26). PyScript wrapper around
# `js.indexedDB`, mirroring the Pi-side `heart-matrix-controller/event_log.py`
# schema so the same `MessageSelector` class works in the preview runtime.
"heart-message-manager/event_log.py" = "/static/preview/heart-message-manager/event_log.py"

# NOTE: do NOT declare [packages] here. PyScript 2024.9.x's TOML→micropip
# bridge passes the dict to `micropip.install()` as a JsProxy, which
# micropip then refuses to iterate
# (`'pyodide.ffi.JsProxy' object is not iterable` from
# micropip/_commands/install.py:142). Installing the same packages
# from preview_main.py via `micropip.install([...])` works because we
# hand micropip a real Python list.
