<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Lindsay's Heart Admin{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Fredoka', 'sans-serif'],
            body: ['Nunito', 'sans-serif'],
          },
          colors: {
            primary: '#6366f1',
            secondary: '#ec4899',
          },
          borderRadius: {
            'xl': '1rem',
            '2xl': '1.5rem',
          },
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #eef2ff 0%, #faf5ff 50%, #fdf2f8 100%);
      min-height: 100vh;
    }
    h1, h2, h3, h4, h5, h6 { font-family: 'Fredoka', sans-serif; }
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 40px -10px rgba(79, 70, 229, 0.2); }
  </style>
</head>
<body class="font-body">
<div class="flex min-h-screen">
  <!-- Sidebar -->
  <aside class="w-64 bg-white shadow-lg m-4 rounded-2xl h-fit sticky top-4">
    <div class="p-6 border-b border-indigo-100">
      <h1 class="text-2xl font-bold font-heading text-primary flex items-center gap-3">
        <span class="w-10 h-10 bg-gradient-to-br from-pink-500 to-red-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-pink-500/30">❤️</span>
        {{ sign_name|default("Heart LED") }}
      </h1>
    </div>
    <nav class="p-4 space-y-2">
      <a href="{{ url_for('dashboard') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl font-semibold transition-all cursor-pointer {% if request.endpoint == 'dashboard' %}bg-gradient-to-r from-primary to-secondary text-white shadow-lg shadow-primary/30{% else %}text-slate-600 hover:bg-indigo-50 hover:text-primary{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
        Dashboard
      </a>
      <a href="{{ url_for('message_list') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl font-semibold transition-all cursor-pointer {% if request.endpoint == 'message_list' %}bg-gradient-to-r from-primary to-secondary text-white shadow-lg shadow-primary/30{% else %}text-slate-600 hover:bg-indigo-50 hover:text-primary{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
        Messages
      </a>
      <a href="{{ url_for('testing') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl font-semibold transition-all cursor-pointer {% if request.endpoint == 'testing' %}bg-gradient-to-r from-primary to-secondary text-white shadow-lg shadow-primary/30{% else %}text-slate-600 hover:bg-indigo-50 hover:text-primary{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
        Testing
      </a>
      <a href="{{ url_for('settings') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl font-semibold transition-all cursor-pointer {% if request.endpoint == 'settings' %}bg-gradient-to-r from-primary to-secondary text-white shadow-lg shadow-primary/30{% else %}text-slate-600 hover:bg-indigo-50 hover:text-primary{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Settings
      </a>
      <a href="{{ url_for('preview') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl font-semibold transition-all cursor-pointer {% if request.endpoint == 'preview' %}bg-gradient-to-r from-primary to-secondary text-white shadow-lg shadow-primary/30{% else %}text-slate-600 hover:bg-indigo-50 hover:text-primary{% endif %}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        Preview
      </a>
      {% if current_user.is_authenticated %}
      <a href="{{ url_for('auth.logout') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl font-semibold transition-all cursor-pointer text-slate-600 hover:bg-red-50 hover:text-red-500">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Logout
      </a>
      {% endif %}
    </nav>
  </aside>
  <!-- Main -->
  <main class="flex-1 p-8">
    {% block content %}{% endblock %}
  </main>
</div>
{% block scripts %}{% endblock %}
</body>
</html>
