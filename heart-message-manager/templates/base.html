<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Lindsay's Heart Admin{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Fredoka', 'sans-serif'],
            body: ['Nunito', 'sans-serif'],
          },
          colors: {
            primary: '#6366f1',
            secondary: '#ec4899',
          },
          borderRadius: {
            'xl': '1rem',
            '2xl': '1.5rem',
          },
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #eef2ff 0%, #faf5ff 50%, #fdf2f8 100%);
      min-height: 100vh;
    }
    h1, h2, h3, h4, h5, h6 { font-family: 'Fredoka', sans-serif; }
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 40px -10px rgba(79, 70, 229, 0.2); }
  </style>
  {% if current_user.is_authenticated %}
  <!--
    APP_CONFIG: server-rendered config for the browser-side bootstrap.
    Visible only to authenticated users (gated by the @login_required on
    every admin route). Values are resolved from the Flask process's
    settings.toml at request time.
  -->
  <script>
    window.APP_CONFIG = {
      mqttWsUrl:        {{ mqtt_ws.MQTT_WS_URL | tojson }},
      mqttUsername:     {{ mqtt.MQTT_USERNAME | tojson }},
      mqttPassword:     {{ mqtt.MQTT_PASSWORD | tojson }},
      mqttTopic:        {{ mqtt.MQTT_TOPIC | tojson }},
      mqttStatusTopic:  {{ mqtt.MQTT_STATUS_TOPIC | tojson }},
      messagesApiUrl:   {{ config.MESSAGES_API_URL | tojson }},
      configApiUrl:     {{ config.CONFIG_API_URL | tojson }},
      apiKey:           {{ auth.API_SECRET_KEY | tojson }},
      mqttLongDisconnectMs: {{ mqtt_ws.MQTT_LONG_DISCONNECT_MS | tojson }}
    };
    console.log("[DEBUG base.html] APP_CONFIG =", JSON.stringify(window.APP_CONFIG, null, 2));
  </script>
  <!-- Native JS shim for MQTT-over-WebSocket. The `?v=N` query string
       is a cache-buster — bump it whenever the shim changes so
       browsers don't pin to a stale copy (the WS packet-encode/decode
       changes in particular are easy to miss when the page is "Live"
       with a broken client). v11 = subscribe at QoS 1 + PUBACK reply
       so Adafruit IO actually delivers the config envelope to the
       browser (v10 subscribed at QoS 0 and Adafruit IO silently
       dropped QoS-1 publishes to QoS-0 subscribers). v12 = PUBLISH
       parse: skip the 2-byte packet ID in the variable header when
       QoS>0 (the v11 fix exposed the prior bug — at QoS=1 the
       `parsePublish` payload was prefixed with two raw bytes that
       broke downstream JSON.parse). v13 = diagnostic logs:
       `[mqtt-ws] PUBLISH received` (every inbound frame at the wire
       level) plus `PUBLISH ok type=... wire_version=...` and
       `PUBLISH payload is not valid JSON` for malformed payloads, so
       the "config didn't update" investigation can see whether frames
       arrive and what shape they carry. v14 = `[mqtt-ws] ingest
       chunk bytes_len / raw_payload` log on the very first entry
       point after WS onmessage — dumps the FULL raw UTF-8 payload
       BEFORE any MQTT frame parsing or JSON parsing, so an envelope
       that arrives but fails downstream is still visible (no silent
       drop below the socket boundary). The IndexedDB shim was
       dropped in #39 — persistence is server-side (S3 + SQLite). -->
  <script type="module">
    import { createMqttWsClient } from "{{ url_for('static', filename='mqtt_ws_client.js') }}?v=16";
    window.createMqttWsClient = createMqttWsClient;
  </script>
  <script src="{{ url_for('static', filename='app.js') }}?v=17"></script>
  <!--
    sign_status.js — Dashboard pill + Settings-page Sign Health section.
    Loaded on every authenticated page (decision 4.3 in openspec/changes/
    add-sign-status-reports/design.md). The script is a no-op on pages
    that have neither #sign-live-pill nor [data-sign-status-field].
  -->
  <script src="{{ url_for('static', filename='sign_status.js') }}?v=1"></script>
  <!--
    pi_upgrade_settings.js — Settings-page Pi Upgrade Control section
    (issue #51). Loaded on every authenticated page; the script is a
    no-op when [data-upgrade-settings-field] is absent. `?v=2` cleared
    the Clear-button handler after the UI rework removed it from the
    template; bump on any future change.
  -->
  <script src="{{ url_for('static', filename='pi_upgrade_settings.js') }}?v=2"></script>
  <!--
    pi_apply_settings.js — Apply button + click-to-edit for the
    Target Pi version input (issue #51 follow-up). Same no-op-when-
    absent contract as pi_upgrade_settings.js.
  -->
  <script src="{{ url_for('static', filename='pi_apply_settings.js') }}?v=1"></script>
  <script>
    // PyScript 2024.9.x fires `py:error` on each <py-script>
    // element when its main module raises during evaluation
    // (uncaught top-level exception, import failure, syntax
    // error in the .py file, etc.). The event is otherwise
    // easy to miss — log it loudly so a broken app_main.py
    // doesn't show up as a silent "nothing happens on
    // page load" symptom in the console.
    document.addEventListener("py:error", function (e) {
      console.error("[py:error]", e.detail && e.detail.error || e);
    });
  </script>
  <script>
    // Generic collapse/expand helper for the card-with-chevron drawer
    // pattern used on the Settings (Effects List) and Testing (Current
    // Config / Active Filters / S3 Bucket) pages. The function reads two
    // elements by ID: `<name>-section` (the body to toggle) and
    // `<name>-chevron` (the chevron that rotates 180° when open).
    function toggleSection(name) {
      const section = document.getElementById(name + '-section');
      const chevron = document.getElementById(name + '-chevron');
      if (section) section.classList.toggle('hidden');
      if (chevron) chevron.classList.toggle('rotate-180');
    }
  </script>

  <!--
    PyScript runtime + app-scoped entry point. Loaded on every
    authenticated page so `window._message_manager` /
    `window._coordinator` / `window._mqtt_ws_client` are available
    page-wide. The `app_main.py` script is purely app-scoped — it
    builds the singletons and starts the WS connection; per-page
    work (canvas, rAF loop) lives in `preview_main.py` which is
    only loaded on /preview.

    Pin to the 2024.9.x release line (same as preview.html). The
    2024.10.x and 2024.9.1+ releases have an `o.slice is not a
    function` regression that crashes the runtime before
    `py:done` fires — see preview.html for the full note.

    The py-config is declared here (not in preview.html) so it's
    loaded once per page; the [files] list declares everything
    that any py-script element on the page might need. The
    [files] only fetches them — actual Python import only
    happens when a py-script element referencing the file runs.
  -->
  <!--
    PyScript runtime + app-scoped entry point are loaded on the
    dashboard route only (templates/dashboard.html) — they are NOT
    in the every-page base shell any more (issue #48, §4.10). The
    simulator (canvas + rAF + EffectsCoordinator) lives on the
    dashboard; Settings / Testing / Messages pages stay independent
    and do not pay the cold-PyScript-load cost.
  -->
  {% endif %}
</head>
<body class="font-body">
<div class="flex min-h-screen">
  <!-- Main -->
  <main class="flex-1 p-8">
    {% if current_user.is_authenticated %}
    <div class="flex items-center gap-3 mb-4 flex-wrap">
      <span class="text-xs text-slate-500 font-medium">MQTT:</span>
      <span id="mqtt-status" class="px-3 py-1 rounded-full bg-slate-100 text-slate-600 text-xs font-semibold">Connecting…</span>
      <span id="mqtt-ws-target" class="text-xs text-slate-400 font-mono"></span>
      <span id="mqtt-sub-topic" class="hidden text-xs text-slate-400 font-mono"></span>
    </div>
    <script>
      // Display the WS URL the browser is trying. Helps diagnose
      // "WS connects from one machine but not another" — if the page
      // shows e.g. ws://localhost:9002/mqtt but the user's browser
      // is on a different host, that's the root cause.
      // Also surface the MQTT topic the browser subscribes to (and
      // that Flask publishes to) so the operator can confirm the
      // page is wired to the same feed as the server.
      (function () {
        const cfg = window.APP_CONFIG || {};
        const el = document.getElementById("mqtt-ws-target");
        if (el && cfg.mqttWsUrl) {
          el.textContent = "→ " + cfg.mqttWsUrl + " (host: " + window.location.host + ")";
        }
        const subEl = document.getElementById("mqtt-sub-topic");
        if (subEl && typeof cfg.mqttTopic === "string" && cfg.mqttTopic) {
          subEl.textContent = "SUB: " + cfg.mqttTopic;
          subEl.classList.remove("hidden");
        }
      })();
    </script>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</div>
{% block scripts %}{% endblock %}
</body>
</html>
