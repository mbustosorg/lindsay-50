<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23ec4899' d='M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z'/%3E%3C/svg%3E">
  <title>Login — Lindsay's Heart Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Fredoka', 'sans-serif'],
            body: ['Nunito', 'sans-serif'],
          },
          colors: {
            primary: '#6366f1',
            secondary: '#ec4899',
          },
          borderRadius: {
            'xl': '1rem',
            '2xl': '1.5rem',
          },
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #eef2ff 0%, #faf5ff 50%, #fdf2f8 100%);
      min-height: 100vh;
    }
    h1, h2, h3, h4, h5, h6 { font-family: 'Fredoka', sans-serif; }
  </style>
</head>
<body class="font-body">
<div class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-pink-500 to-red-500 rounded-2xl shadow-lg shadow-pink-500/30 mb-4">
        <span class="text-3xl">❤️</span>
      </div>
      <h1 class="text-3xl font-bold font-heading text-slate-800">Lindsay's Heart</h1>
      <p class="text-slate-500 mt-1">Admin Login</p>
    </div>

    <!-- Login card -->
    <div class="bg-white shadow-xl rounded-2xl p-8 border border-indigo-50">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="mb-6 space-y-2">
            {% for category, message in messages %}
              <div class="flex items-center gap-3 p-3 rounded-xl {% if category == 'error' %}bg-red-50 text-red-700 border border-red-200{% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
                {% if category == 'error' %}
                  <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                {% else %}
                  <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                {% endif %}
                <span class="text-sm font-medium">{{ message }}</span>
              </div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="space-y-5">
          <div>
            <label for="username" class="block text-sm font-semibold text-slate-700 mb-1">Username</label>
            <input
              type="text"
              id="username"
              name="username"
              autocomplete="username"
              required
              class="w-full px-4 py-3 rounded-xl border border-indigo-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all text-slate-800 placeholder-slate-400"
              placeholder="Enter username"
            >
          </div>
          <div>
            <label for="password" class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              required
              class="w-full px-4 py-3 rounded-xl border border-indigo-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all text-slate-800 placeholder-slate-400"
              placeholder="Enter password"
            >
          </div>
          <button
            type="submit"
            class="w-full py-3 px-4 bg-gradient-to-r from-primary to-secondary text-white font-bold rounded-xl shadow-lg shadow-primary/30 hover:shadow-xl hover:shadow-primary/40 transition-all transform hover:-translate-y-0.5"
          >
            Log In
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
