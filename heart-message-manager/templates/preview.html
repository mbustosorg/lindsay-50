{% extends "base.html" %}
{% block title %}Preview — Lindsay's Heart Admin{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-6">
  <div>
    <h2 class="text-3xl font-bold font-heading text-dark">Preview</h2>
    <p class="text-slate-500 mt-1">Visual sign preview</p>
  </div>
</div>

<div class="bg-white rounded-2xl shadow-lg shadow-indigo-100 p-12">
  <div class="flex flex-col items-center gap-6">
    <div class="text-slate-500 text-sm">
      <span class="font-semibold">Effect:</span> <span id="preview-effect">—</span>
      <span class="mx-3 text-slate-300">|</span>
      <span class="font-semibold">Now displaying:</span> <span id="preview-message">Idle</span>
    </div>
    <div class="relative bg-slate-900 rounded-xl p-4 shadow-2xl w-full max-w-full">
      <canvas id="sign-canvas" width="768" height="768"
              class="block w-full max-w-[min(800px,100%)] h-auto aspect-square mx-auto"
              style="image-rendering: auto;"></canvas>
      <div id="preview-loading" class="absolute inset-0 flex items-center justify-center text-slate-200 text-sm">
        Loading preview…
      </div>
    </div>
  </div>
</div>

<!-- Browser-side entry point. PyScript fetches preview_main.py (and its
     declared file dependencies), runs it, and exposes its top-level
     functions on the `pyscript` global so preview.js can call them.

     The py-config + py-script for `app_main.py` are loaded in
     base.html (gated by auth) so the app-scoped MessageManager +
     EffectsCoordinator + MqttWsClient are available on every
     authenticated page. We only need the page-local `preview_main.py`
     binding shim here — the coordinator's render layer is bound
     onto the app-scoped coordinator that `app_main.py` already
     installed. -->
<py-script src="{{ url_for('static', filename='preview/heart-message-manager/preview_main.py') }}"></py-script>

<!-- App-side main loop. Loaded after PyScript so it can wait for the
     runtime's `py:done` event. base.html's `app.js` (loaded earlier,
     gated by the auth) owns the MQTT-WS connection and the in-browser
     MessageManager; preview.js only registers a per-page callback to
     drive `coordinator.request_message(body)` on each new envelope. -->
<script src="{{ url_for('static', filename='preview/preview.js') }}"></script>
{% endblock %}
