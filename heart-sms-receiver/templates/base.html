<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Lindsay's Heart Admin{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding-top: 1rem; }
    .sidebar { position: sticky; top: 1rem; }
    .mono { font-family: monospace; }
    .msg-body { max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .suppressed-row { opacity: 0.5; }
  </style>
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 sidebar">
      <h5 class="mb-3">Lindsay's Heart</h5>
      <ul class="nav flex-column nav-pills">
        <li class="nav-item"><a class="nav-link{% if request.endpoint == 'dashboard' %} active{% endif %}" href="{{ url_for('dashboard') }}">Messages</a></li>
        <li class="nav-item"><a class="nav-link{% if request.endpoint == 'settings' %} active{% endif %}" href="{{ url_for('settings') }}">Settings</a></li>
        <li class="nav-item"><a class="nav-link{% if request.endpoint == 'testing' %} active{% endif %}" href="{{ url_for('testing') }}">Testing</a></li>
      </ul>
    </nav>
    <main class="col-md-10">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
