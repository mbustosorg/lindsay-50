<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Lindsay's Heart Admin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 2rem; }
        .sidebar { position: fixed; top: 0; left: 0; height: 100vh; width: 200px; background: #f8f9fa; padding-top: 2rem; }
        .sidebar .nav-link { color: #333; }
        .sidebar .nav-link.active { font-weight: bold; color: #0d6efd; }
        .content { margin-left: 220px; padding: 2rem; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h5 class="px-3 mb-4">Lindsay's Heart</h5>
        <nav class="nav flex-column px-3">
            <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="{{ url_for('dashboard') }}">Dashboard</a>
            <a class="nav-link {% if request.endpoint == 'messages_page' %}active{% endif %}" href="{{ url_for('messages_page') }}">Messages</a>
            <a class="nav-link {% if request.endpoint == 'filters_page' %}active{% endif %}" href="{{ url_for('filters_page') }}">Filters</a>
            <a class="nav-link {% if request.endpoint == 'settings_page' %}active{% endif %}" href="{{ url_for('settings_page') }}">Settings</a>
            <a class="nav-link {% if request.endpoint == 'preview_page' %}active{% endif %}" href="{{ url_for('preview_page') }}">Preview</a>
        </nav>
    </div>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
