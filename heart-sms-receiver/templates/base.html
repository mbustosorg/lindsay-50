<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Lindsay's Heart Admin{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding-top: 1rem; }
    .nav { gap: 0.5rem; }
    .nav a { text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <nav class="nav mb-4 border-bottom pb-2">
      <a href="{{ url_for('dashboard') }}" class="btn btn-sm btn-outline-primary">Dashboard</a>
      <a href="{{ url_for('messages_page') }}" class="btn btn-sm btn-outline-primary">Messages</a>
      <a href="{{ url_for('filters_page') }}" class="btn btn-sm btn-outline-primary">Filters</a>
      <a href="{{ url_for('settings_page') }}" class="btn btn-sm btn-outline-primary">Settings</a>
      <a href="{{ url_for('preview_page') }}" class="btn btn-sm btn-outline-primary">Preview</a>
    </nav>

    {% block body %}{% endblock %}
  </div>
</body>
</html>
