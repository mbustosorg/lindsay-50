schema: spec-driven

# Project context — shown when creating artifacts
context: |
  Tech stack: Python/Flask (server), CircuitPython/ESP32 (device), Twilio, Adafruit IO, AWS S3
  Server: Flask + SQLite (source of truth on S3) + Adafruit IO for ESP32 communication
  Testing: pytest; run with `PYTHONPATH=. pytest tests/ -v`
  Conventions: conventional commits (feat:, fix:, test:, etc.)

# Per-artifact rules
rules:
  tasks:
    - Every feature task must have a corresponding test task
    - Break tasks into chunks of max 2 hours
    - Mark each task done in tasks.md with `- [x]` when complete
  test:
    - New functions/modules must have pytest tests covering happy path, edge cases, and errors
    - Run `PYTHONPATH=. pytest tests/ -v` before pushing; fix all failures first
